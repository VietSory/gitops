apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-code
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import json
    import os
    import random
    from datetime import datetime

    QUOTES = [
        "Git is the source of truth.",
        "If it is not in Git, it does not exist.",
        "Argo CD keeps the cluster honest.",
        "Push code, not kubectl apply.",
        "Rollback bằng git revert là GitOps mindset."
    ]

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path.startswith("/api/quote") or self.path == "/":
                body = {
                    "message": random.choice(QUOTES),
                    "backend_pod": os.getenv("HOSTNAME", "unknown"),
                    "time": datetime.utcnow().isoformat() + "Z"
                }

                data = json.dumps(body).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            else:
                self.send_response(404)
                self.end_headers()

    HTTPServer(("0.0.0.0", 8000), Handler).serve_forever()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: backend-code
              mountPath: /app/app.py
              subPath: app.py
      volumes:
        - name: backend-code
          configMap:
            name: backend-code

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
